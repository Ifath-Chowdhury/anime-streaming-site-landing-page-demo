<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer src="/_vercel/insights/script.js"></script>
    <link
      rel="stylesheet"
      href="style.css"
    />

    <title>AnimeSky</title>
    <meta
      name="description"
      content="Anime streaming website landing page demo"
    />
  </head>

  <body>
    <!--Top bar section - contains a logo on one side and a button to sign in on the other side. Currently has placeholder text-->
    <div class="top-bar-container">
      <nav class="top-bar">
        <ul>
          <li>
            <a class="logo">AnimeSky Logo</a>
          </li>

          <li>
            <a class="sign-in">Sign In</a>
          </li>
        </ul>
      </nav>
    </div>

    <!--Header section-->

    <div class="two-column-header">
      <div class="header-column">
        <header>
          <h1>Welcome to AnimeSky!</h1>
          <p>Unlimited anime, the sky is the limit</p>
        </header>
      </div>

      <div class="header-column">
        <header>
          <h1>Login or sign up to get more out of your anime journey.</h1>
        </header>
      </div>
    </div>

    <!--Search bar section-->
    <div class="searchbar-container">
      <p>Ready to watch? Search for your favourite anime below</p>
      <input type="text" placeholder="Search our vast library...">
    </div>
    
  </body>
</html>
