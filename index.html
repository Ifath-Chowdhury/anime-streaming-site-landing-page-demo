<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer src="/_vercel/insights/script.js"></script>
    <link
      rel="stylesheet"
      href="style.css"
    />

    <title>AnimeSky</title>
    <meta
      name="description"
      content="Anime streaming website landing page demo"
    />
  </head>

  <body>
    <!--Top bar section - contains a logo on one side and a button to sign in on the other side. Currently has placeholder text-->
    <div class="top-bar-container">
      <nav class="top-bar">
        <ul>
          <li>
            <a class="logo">AnimeSky Logo</a>
          </li>

          <li>
            <a class="sign-in" href="#">Sign In</a>
          </li>
        </ul>
      </nav>
    </div>

    <!--Header section-->

    <div class="two-column-header">
      <div class="header-column-left">
        <header>
          <h1>Welcome to AnimeSky!</h1>
          <p>Unlimited anime, the sky is the limit</p>
        </header>
      </div>

      <div class="header-column-right">
        <header>
          <div class="slideshow-container">
            <div class="slides fade">
              <img src="images/animesky-slideshow-img-1.jpg" style="width: 100%;">
            </div>

            <div class="slides fade">
              <img src="images/animesky-slideshow-img-2.jpg" style="width: 100%;">
            </div>
            
            <div class="slides fade">
              <img src="images/animesky-slideshow-img-3.jpg" style="width: 100%;">
            </div>
            
            <div class="slides fade">
              <img src="images/animesky-slideshow-img-4.jpg" style="width: 100%;">
            </div>
          </div>
          <br>

          <div style="text-align: center;">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
          <br>

          <h1><a href="#">Login or sign up</a> to get more out of your anime journey.</h1>
        </header>
      </div>

      <!--Script for the image slideshow-->
      <script>
        let slideIndex = 0;
        displaySlides();

        function displaySlides() {
          let i;
          let slides = document.getElementsByClassName("slides");
          let dots = document.getElementsByClassName("dot");

          for (i = 0; i < slides.length; i++) {
            slides[i].style.display = "none";
          }

          slideIndex++;

          if (slideIndex > slides.length) {
            slideIndex = 1;
          }

          for (i = 0; i < dots.length; i++) {
            dots[i].className = dots[i].className.replace(" active", "");
          }

          slides[slideIndex-1].style.display = "block";  
          dots[slideIndex-1].className += " active";
          setTimeout(displaySlides, 5000);
        }
      </script>
    </div>

    <!--Search bar section-->
    <div class="searchbar-container">
      <p>Ready to watch? Search for your favourite anime below</p>
      <input type="text" placeholder="Search our vast library...">
    </div>
    
  </body>
</html>
